<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Interfaz Interactiva | Botón Accesible</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #e0eafc 0%, #cfdef3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            padding: 20px;
        }

        /* Tarjeta principal (glassmorphism + sombra suave) */
        .card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            padding: 2rem 2rem 2.2rem 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2), 0 0 0 1px rgba(255, 255, 255, 0.5);
            text-align: center;
            max-width: 600px;
            width: 100%;
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: scale(1.01);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #1A2A6C, #1e3c72);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.3px;
        }

        .sub {
            color: #2c3e66;
            font-size: 1rem;
            margin-bottom: 2rem;
            font-weight: 500;
            border-bottom: 1px dashed #9aaec0;
            display: inline-block;
            padding-bottom: 6px;
        }

        /* Área del botón principal */
        .button-area {
            margin: 1.8rem 0;
        }

        .btn-principal {
            background: linear-gradient(105deg, #1e3c72, #2a5298);
            border: none;
            padding: 1rem 2.2rem;
            font-size: 1.4rem;
            font-weight: bold;
            color: white;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.3);
            transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            letter-spacing: 1px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            backdrop-filter: blur(2px);
        }

        .btn-principal:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 28px -12px rgba(0, 0, 0, 0.4);
            background: linear-gradient(105deg, #2a5298, #1e3c72);
        }

        .btn-principal:active {
            transform: translateY(2px);
            box-shadow: 0 8px 14px -6px rgba(0, 0, 0, 0.3);
        }

        /* icono dentro del botón (unicode / emoji) */
        .btn-icon {
            font-size: 1.6rem;
            filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
        }

        /* panel de retroalimentación (respuesta al clic) */
        .feedback-panel {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 32px;
            margin-top: 2rem;
            padding: 1rem 1.2rem;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,240,0.8);
        }

        .contador-area {
            display: flex;
            justify-content: center;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            font-size: 1.1rem;
            font-weight: 500;
            background: #f0f4fa;
            padding: 8px 16px;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .contador-num {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(145deg, #0b2b44, #1c4e7a);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            min-width: 3rem;
            display: inline-block;
        }

        .mensaje-dinamico {
            font-size: 1.2rem;
            color: #1f3b4c;
            background: #eef3fc;
            padding: 10px 14px;
            border-radius: 40px;
            margin: 10px 0;
            font-weight: 500;
            transition: background 0.2s;
        }

        .fecha-hora {
            font-size: 0.85rem;
            font-family: monospace;
            background: #e2eaf5;
            padding: 6px 12px;
            border-radius: 32px;
            display: inline-block;
            margin-top: 12px;
            color: #1e4663;
        }

        /* botón secundario estilo sutil */
        .reset-btn {
            background: none;
            border: 1px solid #577a9e;
            color: #2c5282;
            padding: 6px 16px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }

        .reset-btn:hover {
            background: #d9e4f0;
            border-color: #1e4a76;
            color: #0a2f44;
        }

        footer {
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #2e4e6e;
            opacity: 0.7;
        }

        @media (max-width: 480px) {
            .card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 1.6rem;
            }
            .btn-principal {
                padding: 0.75rem 1.6rem;
                font-size: 1.2rem;
            }
            .btn-icon {
                font-size: 1.3rem;
            }
        }

        /* accesibilidad: foco visible */
        .btn-principal:focus-visible, .reset-btn:focus-visible {
            outline: 3px solid #ffb347;
            outline-offset: 2px;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>⚡ Panel interactivo</h1>
    <div class="sub">Acceso directo · Botón central</div>

    <div class="button-area">
        <button class="btn-principal" id="accionBtn" aria-label="Botón de acción principal">
            <span class="btn-icon">✨</span>
            <span>Haz clic aquí</span>
            <span class="btn-icon">🚀</span>
        </button>
    </div>

    <div class="feedback-panel" id="feedbackPanel">
        <div class="contador-area">
            📊 <span>Acciones registradas:</span>
            <span class="contador-num" id="contadorValor">0</span>
        </div>
        <div class="mensaje-dinamico" id="mensajeDinamico">
            🌟 Presiona el botón para comenzar
        </div>
        <div class="fecha-hora" id="fechaHoraDisplay">
            <!-- se actualizará con JS -->
        </div>
        <button class="reset-btn" id="resetBtn" aria-label="Reiniciar contador y mensaje">⟳ Reiniciar contador</button>
    </div>
    <footer>
        💡 Interfaz totalmente funcional | Botón accesible, feedback visual y contador
    </footer>
</div>

<script>
    (function(){
        // ---- Estado y elementos del DOM ----
        let contadorClics = 0;
        const MAX_MENSAJES = 8;  // para variedad de mensajes

        const botonAccion = document.getElementById('accionBtn');
        const resetBtn = document.getElementById('resetBtn');
        const contadorSpan = document.getElementById('contadorValor');
        const mensajeEl = document.getElementById('mensajeDinamico');
        const fechaHoraEl = document.getElementById('fechaHoraDisplay');

        // ---- Lista de mensajes creativos y dinámicos ----
        const mensajes = [
            "🎉 ¡Acción registrada! Muy bien.",
            "⚡ Botón pulsado · Respuesta exitosa.",
            "🔥 Sigue así, cada clic suma.",
            "💡 Interacción detectada. ¡Genial!",
            "🚀 Otro clic más. El sistema responde.",
            "✨ Has tocado el botón central.",
            "📡 Comando recibido · procesando...",
            "🎈 ¡Click! La interfaz funciona perfecto.",
            "🌟 Brillo extra: contador +1.",
            "🎯 Precisión total. Sigue participando."
        ];

        // función que actualiza el contador en el DOM
        function actualizarContadorVisual() {
            contadorSpan.textContent = contadorClics;
        }

        // función que obtiene un mensaje aleatorio (con un poco de variabilidad según el contador)
        function obtenerMensajePorClic(numClics) {
            // Si el contador es bajo usamos mensajes base + humor
            if (numClics === 0) return "🌟 Presiona el botón para comenzar";
            if (numClics === 1) return "🎉 ¡Primer clic! Bienvenido/a a la experiencia.";
            if (numClics === 2) return "⚡ Segundo clic. La energía aumenta.";
            if (numClics === 3) return "🍀 Tercero ... vas con todo.";
            if (numClics === 5) return "🎯 ¡Quinto clic! Eres un experto.";
            if (numClics === 10) return "🏆 ¡10 clics! Excelente ritmo.";
            if (numClics === 20) return "🔥🔥 20 interacciones. Modo leyenda.";
            // para otros valores usamos aleatorio de la lista base
            const indice = (numClics + Math.floor(Math.random() * 10)) % mensajes.length;
            return mensajes[indice];
        }

        // función para actualizar el mensaje dinámico
        function actualizarMensaje() {
            let nuevoMensaje = "";
            if (contadorClics === 0) {
                nuevoMensaje = "🌟 Presiona el botón para comenzar";
            } else {
                nuevoMensaje = obtenerMensajePorClic(contadorClics);
                // añadir un pequeño toque de "clic número"
                nuevoMensaje = `📌 #${contadorClics} · ${nuevoMensaje}`;
            }
            mensajeEl.textContent = nuevoMensaje;
            // efecto breve de resplandor en el mensaje
            mensajeEl.style.transition = "background 0.1s";
            mensajeEl.style.background = "#f9f3cf";
            setTimeout(() => {
                mensajeEl.style.background = "#eef3fc";
            }, 180);
        }

        // actualizar fecha y hora en tiempo real
        function actualizarFechaHora() {
            const ahora = new Date();
            const opcionesFecha = { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' };
            const fechaStr = ahora.toLocaleDateString(undefined, opcionesFecha);
            const horaStr = ahora.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            fechaHoraEl.textContent = `🕒 ${fechaStr} · ${horaStr}`;
        }

        // función principal al hacer clic en el botón
        function manejarClicPrincipal() {
            // incrementar contador
            contadorClics++;
            actualizarContadorVisual();

            // actualizar el mensaje temático
            actualizarMensaje();

            // pequeño efecto háptico visual en el botón (simular pulsación extra)
            botonAccion.style.transform = "scale(0.97)";
            setTimeout(() => {
                if (botonAccion) botonAccion.style.transform = "";
            }, 120);

            // añadir un breve feedback auditivo? (sin sonido automático, respetamos navegador)
            // actualizar la fecha y hora en cada clic para que se vea viva
            actualizarFechaHora();

            // Opcional: animación en el contador (destello)
            const contadorBox = document.querySelector('.contador-area');
            if (contadorBox) {
                contadorBox.style.transform = "scale(1.02)";
                setTimeout(() => {
                    if (contadorBox) contadorBox.style.transform = "";
                }, 150);
            }
        }

        // función para reiniciar el estado
        function reiniciarContador() {
            if (contadorClics === 0) {
                // si ya está en cero, mostramos mensaje amigable
                mensajeEl.textContent = "🔁 Ya estás en cero · ¡prueba el botón principal!";
                setTimeout(() => {
                    if (contadorClics === 0) actualizarMensaje();
                }, 1500);
                return;
            }
            contadorClics = 0;
            actualizarContadorVisual();
            actualizarMensaje();   // esto pondrá el mensaje inicial
            // efecto de reset en el feedback
            const panel = document.getElementById('feedbackPanel');
            if (panel) {
                panel.style.backgroundColor = "rgba(255, 248, 225, 0.95)";
                setTimeout(() => {
                    if (panel) panel.style.backgroundColor = "";
                }, 300);
            }
            // aseguramos fecha actualizada
            actualizarFechaHora();
        }

        // También actualizamos la fecha/hora cada segundo para que siempre se vea actualizada
        // (mejor experiencia: reloj dinámico)
        let intervaloReloj = null;

        function iniciarReloj() {
            if (intervaloReloj) clearInterval(intervaloReloj);
            actualizarFechaHora(); // inmediato
            intervaloReloj = setInterval(() => {
                actualizarFechaHora();
            }, 1000);
        }

        // ----- Listeners y eventos -----
        function bindEvents() {
            if (botonAccion) {
                botonAccion.addEventListener('click', manejarClicPrincipal);
                // para accesibilidad con teclado también funciona nativamente
            }
            if (resetBtn) {
                resetBtn.addEventListener('click', reiniciarContador);
            }
        }

        // inicializar todo
        function init() {
            bindEvents();
            iniciarReloj();
            // establecemos valores iniciales
            contadorClics = 0;
            actualizarContadorVisual();
            actualizarMensaje();
            // decoración adicional: al cargar mostrar una bienvenida en el mensaje
            mensajeEl.textContent = "🌟 Presiona el botón para comenzar";
        }

        init();

        // pequeño extra: si se presiona la tecla 'Enter' estando en el botón, ya funciona por defecto
        // seguridad extra para evitar dobles inicializaciones
    })();
</script>
</body>
</html>
